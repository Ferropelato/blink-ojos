<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blink - Abrir en celular</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
      background: #1a2a24;
      color: #fff;
      border-radius: 12px;
    }
    h1 { font-size: 1.2rem; margin-bottom: 8px; }
    p { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }
    img { 
      display: block; 
      margin: 0 auto 20px; 
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }
    .url {
      background: #2a3a34;
      padding: 12px;
      border-radius: 8px;
      word-break: break-all;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .hint { font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <h1>📱 Abrir Blink en el celular</h1>
  <p>Escanea este QR con la cámara del teléfono (no con Expo Go)</p>
  <img id="qr" src="" alt="QR Code" width="260" height="260">
  <div class="url" id="url"></div>
  <p class="hint">Asegúrate de que el celular y la PC estén en la misma red WiFi</p>
</body>
<script>
  // IP de tu PC en la red local (cámbiala si no funciona)
  const IP = '192.168.1.152';
  const PORT = '8081';
  const url = 'http://' + IP + ':' + PORT;
  
  document.getElementById('qr').src = 
    'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(url);
  document.getElementById('url').textContent = url;
</script>
</html>
